name: R Pipeline Check

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install packages
        run: |
          Rscript -e 'install.packages(c("survival","ggplot2"))'

      - name: Pipeline test
        run: |
          Rscript -e 'print("Pipeline OK")'